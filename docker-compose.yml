services:
  ollama:
    image: ollama/ollama:0.23.2
    container_name: spanish-reader-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  ollama-pull:
    image: ollama/ollama:0.23.2
    container_name: spanish-reader-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "echo Checking $${OLLAMA_MODEL} &&
       ollama show $${OLLAMA_MODEL} > /dev/null 2>&1 ||
       (echo Pulling $${OLLAMA_MODEL} && ollama pull $${OLLAMA_MODEL}) &&
       echo Model ready: $${OLLAMA_MODEL}"
    restart: "no"

  app:
    build: .
    container_name: spanish-parallel-reader
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "${APP_HOST_PORT:-8502}:8501"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      AVAILABLE_OLLAMA_MODELS: ${AVAILABLE_OLLAMA_MODELS:-qwen2.5:3b,qwen2.5:7b,qwen2.5:14b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.1}
      OLLAMA_TOP_P: ${OLLAMA_TOP_P:-0.9}
      OLLAMA_REQUEST_TIMEOUT: ${OLLAMA_REQUEST_TIMEOUT:-240}
      MAX_CHARS_PER_CHUNK: ${MAX_CHARS_PER_CHUNK:-2200}
      CHECKER_ENABLED: ${CHECKER_ENABLED:-true}
      CHECKER_MODE: ${CHECKER_MODE:-fast}
      CHECKER_MODEL: ${CHECKER_MODEL:-}
      CHECKER_SAMPLE_RATE: ${CHECKER_SAMPLE_RATE:-0.5}
      CHECKER_MAX_CHARS: ${CHECKER_MAX_CHARS:-2500}
      CHECKER_REQUIRE_PASS: ${CHECKER_REQUIRE_PASS:-false}
      CHECKER_TIMEOUT_SECONDS: ${CHECKER_TIMEOUT_SECONDS:-45}
      CHECKER_CACHE_ENABLED: ${CHECKER_CACHE_ENABLED:-true}
      CHECKER_DETAILED_DIAGNOSTICS: ${CHECKER_DETAILED_DIAGNOSTICS:-false}
      CHECKER_LLM_ENABLED: ${CHECKER_LLM_ENABLED:-true}
      CHECKER_BATCH_SIZE: ${CHECKER_BATCH_SIZE:-1}
      ENABLE_TTS: ${ENABLE_TTS:-true}
      TTS_PROVIDER: ${TTS_PROVIDER:-browser}
      TTS_LANGUAGE: ${TTS_LANGUAGE:-es}
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  ollama_models:
