services:
  mongo:
    image: mongo:7.0
    container_name: spanish-reader-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 10

  app:
    build: .
    container_name: spanish-parallel-reader
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_HOST_PORT:-8502}:8501"
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      AVAILABLE_OLLAMA_MODELS: ${AVAILABLE_OLLAMA_MODELS:-qwen2.5:7b,qwen2.5:3b,qwen2.5:14b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      # 4096 is a safe default on many Apple Silicon systems.
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-4096}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.1}
      OLLAMA_TOP_P: ${OLLAMA_TOP_P:-0.9}
      OLLAMA_REQUEST_TIMEOUT: ${OLLAMA_REQUEST_TIMEOUT:-240}
      # Keep the default aligned with the main compose profile.
      # If users switch to qwen2.5:3b in the app, model-specific guardrails
      # (smaller chunk cap + lower output budget warning) apply automatically.
      MAX_CHARS_PER_CHUNK: ${MAX_CHARS_PER_CHUNK:-2200}
      TRANSLATION_CACHE_MAX_ENTRIES: ${TRANSLATION_CACHE_MAX_ENTRIES:-50}
      TRANSLATION_INCLUDE_ENRICHMENTS: ${TRANSLATION_INCLUDE_ENRICHMENTS:-true}
      MONGO_ENABLED: ${MONGO_ENABLED:-true}
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-spanish_parallel_reader}
      MONGO_HISTORY_COLLECTION: ${MONGO_HISTORY_COLLECTION:-translation_history}
      MONGO_USER_ID: ${MONGO_USER_ID:-default-user}
      MONGO_HISTORY_LIMIT: ${MONGO_HISTORY_LIMIT:-25}
      MONGO_SAVE_SOURCE_TEXT: ${MONGO_SAVE_SOURCE_TEXT:-true}
      CHECKER_ENABLED: ${CHECKER_ENABLED:-true}
      CHECKER_MODE: ${CHECKER_MODE:-fast}
      CHECKER_MODEL: ${CHECKER_MODEL:-}
      CHECKER_SAMPLE_RATE: ${CHECKER_SAMPLE_RATE:-0.5}
      CHECKER_MAX_CHARS: ${CHECKER_MAX_CHARS:-2500}
      CHECKER_REQUIRE_PASS: ${CHECKER_REQUIRE_PASS:-false}
      CHECKER_TIMEOUT_SECONDS: ${CHECKER_TIMEOUT_SECONDS:-45}
      CHECKER_CACHE_ENABLED: ${CHECKER_CACHE_ENABLED:-true}
      CHECKER_DETAILED_DIAGNOSTICS: ${CHECKER_DETAILED_DIAGNOSTICS:-false}
      CHECKER_LLM_ENABLED: ${CHECKER_LLM_ENABLED:-true}
      CHECKER_BATCH_SIZE: ${CHECKER_BATCH_SIZE:-1}
      CHECKER_DETERMINISTIC_WORKERS: ${CHECKER_DETERMINISTIC_WORKERS:-4}
      CHECKER_LLM_CONCURRENCY: ${CHECKER_LLM_CONCURRENCY:-1}
      ENABLE_TTS: ${ENABLE_TTS:-true}
      TTS_PROVIDER: ${TTS_PROVIDER:-browser}
      TTS_LANGUAGE: ${TTS_LANGUAGE:-es-MX}
      TTS_RATE: ${TTS_RATE:-0.9}

volumes:
  mongo_data:
